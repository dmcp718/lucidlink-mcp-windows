<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}} — LucidLink Audit Trail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "react":            "https://esm.sh/react@18.3.1",
          "react/jsx-runtime":"https://esm.sh/react@18.3.1/jsx-runtime",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "recharts":         "https://esm.sh/recharts@2.15.0?deps=react@18.3.1,react-dom@18.3.1",
          "lucide-react":     "https://esm.sh/lucide-react@0.460.0?deps=react@18.3.1"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body { font-family: 'Inter', system-ui, sans-serif; background: #020617; color: #e2e8f0; }
      code, .font-mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="env,react">
      import React, { useState, useMemo } from "react";
      import { createRoot } from "react-dom/client";
      import {
          BarChart, Bar, PieChart, Pie, Cell,
          XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area,
          ReferenceLine, ReferenceArea, Label,
      } from "recharts";
      import {
          Activity, Users, FolderOpen, Server, Trash2, Eye, Edit3, FilePlus,
          Move, Pin, Tag, HardDrive, AlertTriangle, TrendingUp, Database, Zap,
          Search, X, EyeOff,
      } from "lucide-react";

      // ── Data — edit this block to point at your own audit-trail data ─────
      // The blueprint inlines a snapshot. To wire live OpenSearch, replace
      // these consts with fetched aggregations.

      const META = {{META_JSON}};
      const USERS = {{USERS_JSON}};
      const ACTION_GROUPS = {{ACTION_GROUPS_JSON}};
      const OS_DIST = {{OS_DIST_JSON}};
      const HOSTS = {{HOSTS_JSON}};
      const DAILY = {{DAILY_JSON}};
      const TOP_PATHS = {{TOP_PATHS_JSON}};
      const RECENT = {{RECENT_JSON}};

      // ── Derived data ─────────────────────────────────────────────────────

      // Map icon string identifiers → lucide-react components. Action groups
      // are JSON-friendly (icon: "Eye") so the template stays serializable.
      const ICONS = {
        Eye, Trash2, FilePlus, Edit3, Move, FolderOpen, Tag, Pin, Activity,
        Users, Server, HardDrive, AlertTriangle, TrendingUp, Database, Zap,
        Search, X, EyeOff,
      };
      const resolveIcon = (n) => ICONS[n] ?? Activity;

      // Flattened lookup for chip rendering in the recent-activity table.
      const ACTION_LOOKUP = Object.fromEntries(
        ACTION_GROUPS.flatMap((g) => g.actions).map((a) => [a.name, a])
      );
      const READ_COUNT = ACTION_LOOKUP["FileRead"]?.count ?? 0;
      const WRITE_COUNT = [
        "FileWritten", "FileCreate", "FileDelete",
        "DirectoryCreate", "DirectoryDelete", "Move",
      ].reduce((s, n) => s + (ACTION_LOOKUP[n]?.count ?? 0), 0);

      const fmt = (n) => {
          if (n >= 1_000_000) return (n / 1_000_000).toFixed(2) + "M";
          if (n >= 1_000) return (n / 1_000).toFixed(1) + "K";
          return String(n);
      };
      const fmtFull = (n) => n.toLocaleString();
      const pct = (n, total) => ((n / total) * 100).toFixed(1);

      // ── Primitives ───────────────────────────────────────────────────────

      const Card = ({ children, className = "" }) => (
          <div className={`bg-slate-900 border border-slate-800 rounded-xl p-5 ${className}`}>{children}</div>
      );

      const StatCard = ({ icon: Icon, label, value, sub, accent = "#60a5fa" }) => (
          <Card className="hover:border-slate-700 transition">
              <div className="flex items-start justify-between mb-3">
                  <div className="text-xs uppercase tracking-wider text-slate-500 font-medium">{label}</div>
                  <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ backgroundColor: `${accent}20` }}>
                      <Icon size={16} style={{ color: accent }} aria-hidden />
                  </div>
              </div>
              <div className="text-2xl font-bold text-slate-100 tabular-nums">{value}</div>
              {sub && <div className="text-xs text-slate-500 mt-1 min-h-[16px]">{sub}</div>}
          </Card>
      );

      const SectionTitle = ({ children, hint }) => (
          <div className="flex items-baseline justify-between mb-4 gap-3 flex-wrap">
              <h2 className="text-sm font-semibold text-slate-200 uppercase tracking-wider">{children}</h2>
              {hint && <span className="text-xs text-slate-500">{hint}</span>}
          </div>
      );

      const InlineNote = ({ icon: Icon, accent = "#fbbf24", children }) => (
          <div className="mt-3 p-3 bg-slate-950 border border-slate-800 rounded-lg flex items-start gap-2">
              <Icon size={14} style={{ color: accent }} className="mt-0.5 flex-shrink-0" aria-hidden />
              <div className="text-xs text-slate-400">{children}</div>
          </div>
      );

      const FilterChip = ({ label, onClear }) => (
          <span className="inline-flex items-center gap-1.5 px-2 py-1 rounded-md bg-slate-800 border border-slate-700 text-slate-200 font-mono">
              {label}
              <button
                  onClick={onClear}
                  className="text-slate-400 hover:text-slate-100 -mr-0.5"
                  aria-label={`Clear filter: ${label}`}
              >
                  <X size={12} />
              </button>
          </span>
      );

      const ChartTooltip = ({ active, payload, label }) => {
          if (!active || !payload || !payload.length) return null;
          return (
              <div className="bg-slate-950 border border-slate-700 rounded-lg p-3 shadow-xl">
                  {label && <div className="text-xs text-slate-400 mb-1">{label}</div>}
                  {payload.map((p, i) => (
                      <div key={i} className="flex items-center gap-2 text-xs">
                          <div className="w-2 h-2 rounded-sm" style={{ backgroundColor: p.color || p.payload?.color }} />
                          <span className="text-slate-300">{p.name}:</span>
                          <span className="text-slate-100 font-medium tabular-nums">{fmtFull(p.value)}</span>
                      </div>
                  ))}
              </div>
          );
      };

      // ── Page ─────────────────────────────────────────────────────────────

      function Dashboard() {
          const [chartScale, setChartScale] = useState("log");
          const [usersScale, setUsersScale] = useState("log");
          const [hideTopUser, setHideTopUser] = useState(false);
          const [actionFilter, setActionFilter] = useState(null);
          const [pathSearch, setPathSearch] = useState("");

          const visibleUsers = useMemo(
              () => (hideTopUser ? USERS.slice(1) : USERS),
              [hideTopUser],
          );
          const visibleRecent = useMemo(() => {
              const term = pathSearch.trim().toLowerCase();
              return RECENT.filter((e) =>
                  (!actionFilter || e.action === actionFilter) &&
                  (!term || e.path.toLowerCase().includes(term))
              );
          }, [actionFilter, pathSearch]);
          const filtersActive = hideTopUser || actionFilter || pathSearch;
          const clearFilters = () => {
              setHideTopUser(false);
              setActionFilter(null);
              setPathSearch("");
          };

          const dailyForChart = useMemo(() => DAILY.map((d) => ({ ...d })), []);
          const totalUsers = USERS.reduce((s, u) => s + u.count, 0);
          const davidPct = USERS.length ? pct(USERS[0].count, totalUsers) : "0.0";
          const teamcachePct = HOSTS.length ? pct(HOSTS[0].count, META.totalEvents) : "0.0";

          return (
              <div className="min-h-screen bg-slate-950 text-slate-200 p-6">
                  <div className="max-w-7xl mx-auto">

                      <header className="mb-8 pb-6 border-b border-slate-800">
                          <div className="flex items-center gap-3 mb-2 flex-wrap">
                              <span className="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium bg-slate-900 border border-slate-800 text-slate-400" title="Static snapshot from a fixed time range">
                                  <span className="w-1.5 h-1.5 rounded-full bg-slate-500" />
                                  Snapshot
                              </span>
                              <span className="text-xs text-slate-500 font-mono">
                                  {META.rangeStart} → {META.rangeEnd} · {META.spanDays} days
                              </span>
                              {META.lastEvent && (<>
                                  <span className="text-xs text-slate-500">·</span>
                                  <span className="text-xs text-slate-500">last event {META.lastEvent}</span>
                              </>)}
                          </div>
                          <h1 className="text-3xl font-bold text-slate-100 tracking-tight">{META.filespace}</h1>
                          <p className="text-sm text-slate-400 mt-1">Audit trail dashboard</p>
                      </header>

                      {filtersActive && (
                          <div className="mb-6 flex items-center gap-2 flex-wrap text-xs">
                              <span className="text-slate-500 uppercase tracking-wider font-medium">Active filters:</span>
                              {hideTopUser && USERS[0] && <FilterChip label={`hidden: ${USERS[0].short}`} onClear={() => setHideTopUser(false)} />}
                              {actionFilter && <FilterChip label={`action: ${actionFilter}`} onClear={() => setActionFilter(null)} />}
                              {pathSearch && <FilterChip label={`path: "${pathSearch}"`} onClear={() => setPathSearch("")} />}
                              <button onClick={clearFilters} className="ml-auto text-slate-400 hover:text-slate-200 underline decoration-slate-700 hover:decoration-slate-500">Clear all</button>
                          </div>
                      )}

                      <section aria-label="Key metrics" className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                          <StatCard icon={Activity}       label="Total events"     value={fmtFull(META.totalEvents)} sub={`across ${META.spanDays} days`} accent="#60a5fa" />
                          <StatCard icon={Users}          label="Unique users"     value={`~${META.uniqueUsers}`}    sub={USERS[0] ? `top: ${USERS[0].short} (${davidPct}%)` : "—"} accent="#a78bfa" />
                          <StatCard icon={Eye}            label="Read ops"         value={fmt(READ_COUNT)}           sub={`${pct(READ_COUNT, META.totalEvents)}% of all events`} accent="#34d399" />
                          <StatCard icon={AlertTriangle}  label="Write/mutate ops" value={fmt(WRITE_COUNT)}          sub="creates, writes, deletes, moves" accent="#f87171" />
                      </section>

                      <Card className="mb-6">
                          <div className="flex items-baseline justify-between mb-4 flex-wrap gap-2">
                              <div>
                                  <h2 className="text-sm font-semibold text-slate-200 uppercase tracking-wider">Activity timeline</h2>
                                  <p className="text-xs text-slate-500 mt-1">Daily event counts.</p>
                              </div>
                              <div className="flex gap-1 bg-slate-800 p-1 rounded-lg" role="group" aria-label="Y-axis scale">
                                  <button onClick={() => setChartScale("log")}    className={`text-xs px-3 py-1 rounded ${chartScale === "log"    ? "bg-slate-700 text-slate-100" : "text-slate-400 hover:text-slate-200"}`} aria-pressed={chartScale === "log"}>Log</button>
                                  <button onClick={() => setChartScale("linear")} className={`text-xs px-3 py-1 rounded ${chartScale === "linear" ? "bg-slate-700 text-slate-100" : "text-slate-400 hover:text-slate-200"}`} aria-pressed={chartScale === "linear"}>Linear</button>
                              </div>
                          </div>
                          <ResponsiveContainer width="100%" height={300}>
                              <AreaChart data={dailyForChart} margin={{ top: 16, right: 16, left: 0, bottom: 0 }}>
                                  <defs>
                                      <linearGradient id="actGrad" x1="0" y1="0" x2="0" y2="1">
                                          <stop offset="0%" stopColor="#60a5fa" stopOpacity={0.4} />
                                          <stop offset="100%" stopColor="#60a5fa" stopOpacity={0} />
                                      </linearGradient>
                                  </defs>
                                  <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                                  <XAxis dataKey="date" stroke="#64748b" fontSize={10} interval={2} />
                                  <YAxis
                                      stroke="#64748b"
                                      fontSize={10}
                                      scale={chartScale}
                                      domain={chartScale === "log" ? [1, "dataMax"] : [0, "dataMax"]}
                                      tickFormatter={fmt}
                                      allowDataOverflow
                                  />
                                  <Tooltip content={<ChartTooltip />} />
                                  <Area type="monotone" dataKey="count" stroke="#60a5fa" strokeWidth={2} fill="url(#actGrad)" name="Events" />
                              </AreaChart>
                          </ResponsiveContainer>
                      </Card>

                      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
                          <Card className="lg:col-span-2">
                              <SectionTitle hint="all actions across full period">Operation mix</SectionTitle>
                              <div className="space-y-4">
                                  {ACTION_GROUPS.map((group) => (
                                      <div key={group.title}>
                                          <div className="text-xs uppercase tracking-wider text-slate-500 font-medium mb-2">{group.title}</div>
                                          <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                              {group.actions.map((a) => {
                                                  const Icon = resolveIcon(a.icon);
                                                  const p = pct(a.count, META.totalEvents);
                                                  const active = actionFilter === a.name;
                                                  return (
                                                      <button
                                                          key={a.name}
                                                          type="button"
                                                          onClick={() => setActionFilter(active ? null : a.name)}
                                                          aria-pressed={active}
                                                          title={active ? `Clear filter: ${a.name}` : `Filter Recent Activity to ${a.name}`}
                                                          className={`text-left bg-slate-950 border rounded-lg p-3 transition-colors ${active ? "border-slate-500 ring-1 ring-slate-500" : "border-slate-800 hover:border-slate-700"}`}
                                                      >
                                                          <div className="flex items-center gap-2 mb-2">
                                                              <Icon size={14} style={{ color: a.color }} aria-hidden />
                                                              <span className="text-xs text-slate-300 font-medium truncate">{a.name}</span>
                                                          </div>
                                                          <div className="flex items-baseline justify-between">
                                                              <div className="text-lg font-bold text-slate-100 tabular-nums">{fmt(a.count)}</div>
                                                              <div className="text-xs text-slate-500 tabular-nums">{p}%</div>
                                                          </div>
                                                          <div className="mt-2 h-1 bg-slate-800 rounded-full overflow-hidden">
                                                              <div className="h-full rounded-full" style={{ width: `${Math.max(parseFloat(p), 0.5)}%`, backgroundColor: a.color }} />
                                                          </div>
                                                      </button>
                                                  );
                                              })}
                                          </div>
                                      </div>
                                  ))}
                              </div>
                          </Card>

                          <Card>
                              <SectionTitle>Client OS</SectionTitle>
                              <ResponsiveContainer width="100%" height={180}>
                                  <PieChart>
                                      <Pie data={OS_DIST} dataKey="count" nameKey="name" innerRadius={45} outerRadius={75} paddingAngle={2}>
                                          {OS_DIST.map((entry, i) => <Cell key={i} fill={entry.color} stroke="#0f172a" strokeWidth={2} />)}
                                      </Pie>
                                      <Tooltip content={<ChartTooltip />} />
                                  </PieChart>
                              </ResponsiveContainer>
                              <ul className="space-y-1.5 mt-2">
                                  {OS_DIST.slice(0, 5).map((os) => (
                                      <li key={os.name} className="flex items-center justify-between text-xs">
                                          <div className="flex items-center gap-2 min-w-0">
                                              <div className="w-2 h-2 rounded-sm flex-shrink-0" style={{ backgroundColor: os.color }} />
                                              <span className="text-slate-300 truncate">{os.name}</span>
                                          </div>
                                          <div className="text-slate-400 tabular-nums flex-shrink-0">{pct(os.count, META.totalEvents)}%</div>
                                      </li>
                                  ))}
                              </ul>
                          </Card>
                      </div>

                      <Card className="mb-6">
                          <div className="flex items-baseline justify-between mb-4 flex-wrap gap-2">
                              <div>
                                  <h2 className="text-sm font-semibold text-slate-200 uppercase tracking-wider">Top users by activity</h2>
                                  <p className="text-xs text-slate-500 mt-1">
                                      Top {visibleUsers.length} by event count.
                                      {hideTopUser ? " Top user hidden." : " Default log scale — long-tail visibility."}
                                  </p>
                              </div>
                              <div className="flex gap-2 flex-wrap">
                                  <button
                                      onClick={() => setHideTopUser((v) => !v)}
                                      aria-pressed={hideTopUser}
                                      className={`text-xs px-3 py-1 rounded inline-flex items-center gap-1.5 border transition-colors ${hideTopUser ? "bg-slate-700 border-slate-600 text-slate-100" : "bg-slate-800 border-slate-800 text-slate-400 hover:text-slate-200"}`}
                                      title="Hide the top user so the long tail is visible"
                                  >
                                      <EyeOff size={12} aria-hidden />
                                      {hideTopUser ? "Show top user" : "Hide top user"}
                                  </button>
                                  <div className="flex gap-1 bg-slate-800 p-1 rounded-lg" role="group" aria-label="Users axis scale">
                                      <button onClick={() => setUsersScale("log")}    className={`text-xs px-3 py-1 rounded ${usersScale === "log"    ? "bg-slate-700 text-slate-100" : "text-slate-400 hover:text-slate-200"}`} aria-pressed={usersScale === "log"}>Log</button>
                                      <button onClick={() => setUsersScale("linear")} className={`text-xs px-3 py-1 rounded ${usersScale === "linear" ? "bg-slate-700 text-slate-100" : "text-slate-400 hover:text-slate-200"}`} aria-pressed={usersScale === "linear"}>Linear</button>
                                  </div>
                              </div>
                          </div>
                          <ResponsiveContainer width="100%" height={380}>
                              <BarChart data={visibleUsers} layout="vertical" margin={{ top: 5, right: 30, left: 110, bottom: 5 }}>
                                  <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" horizontal={false} />
                                  <XAxis
                                      type="number"
                                      stroke="#64748b"
                                      fontSize={10}
                                      scale={usersScale}
                                      domain={usersScale === "log" ? [1, "dataMax"] : [0, "dataMax"]}
                                      tickFormatter={fmt}
                                      allowDataOverflow
                                  />
                                  <YAxis type="category" dataKey="short" stroke="#64748b" fontSize={11} width={110} />
                                  <Tooltip content={<ChartTooltip />} />
                                  <Bar dataKey="count" fill="#a78bfa" radius={[0, 4, 4, 0]} name="Events" />
                              </BarChart>
                          </ResponsiveContainer>
                      </Card>

                      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                          <Card>
                              <SectionTitle hint={`top ${HOSTS.length}`}>Hosts</SectionTitle>
                              <ul className="space-y-2 max-h-96 overflow-auto">
                                  {HOSTS.map((h) => {
                                      const p = pct(h.count, META.totalEvents);
                                      return (
                                          <li key={h.name} className="flex items-center gap-3">
                                              <Server size={12} className="text-slate-500 flex-shrink-0" aria-hidden />
                                              <div className="flex-1 min-w-0">
                                                  <div className="flex items-center justify-between gap-2">
                                                      <span className="text-xs text-slate-200 truncate font-mono">{h.name}</span>
                                                      <span className="text-xs text-slate-400 tabular-nums flex-shrink-0">{fmt(h.count)}</span>
                                                  </div>
                                                  <div className="flex items-center gap-2 mt-0.5">
                                                      <div className="flex-1 h-1 bg-slate-800 rounded-full overflow-hidden">
                                                          <div className="h-full bg-gradient-to-r from-cyan-500 to-blue-500 rounded-full" style={{ width: `${Math.max(parseFloat(p), 0.3)}%` }} />
                                                      </div>
                                                      <span className="text-xs text-slate-500 w-24 truncate text-right">{h.type}</span>
                                                  </div>
                                              </div>
                                          </li>
                                      );
                                  })}
                              </ul>
                              {HOSTS[0] && (
                                  <InlineNote icon={HardDrive} accent="#22d3ee">
                                      <span className="text-slate-200 font-medium">{HOSTS[0].name}</span> alone is <span className="text-slate-200 font-medium">{teamcachePct}%</span> of all events. Likely automated workload (cache, prewarm, sync) — skews aggregate stats.
                                  </InlineNote>
                              )}
                          </Card>

                          <Card>
                              <SectionTitle hint="most-touched files">Hot paths</SectionTitle>
                              <ul className="space-y-2 max-h-96 overflow-auto">
                                  {TOP_PATHS.map((p, i) => (
                                      <li key={i} className="bg-slate-950 border border-slate-800 rounded-lg p-2.5">
                                          <div className="flex items-start justify-between gap-2">
                                              <div className="flex-1 min-w-0">
                                                  <div className="text-xs font-mono text-slate-300 truncate" title={p.path}>{p.path}</div>
                                                  {p.kind && <div className="text-xs text-slate-500 mt-0.5">{p.kind}</div>}
                                              </div>
                                              <div className="text-xs font-medium text-slate-100 tabular-nums flex-shrink-0">{p.count}</div>
                                          </div>
                                      </li>
                                  ))}
                              </ul>
                          </Card>
                      </div>

                      <Card className="mb-6">
                          <div className="flex items-baseline justify-between mb-4 flex-wrap gap-3">
                              <div>
                                  <h2 className="text-sm font-semibold text-slate-200 uppercase tracking-wider">Recent activity</h2>
                                  <p className="text-xs text-slate-500 mt-1">
                                      Showing {visibleRecent.length} of {RECENT.length}
                                      {actionFilter && <> · action: <span className="text-slate-300">{actionFilter}</span></>}
                                      {pathSearch && <> · path: <span className="text-slate-300 font-mono">"{pathSearch}"</span></>}
                                  </p>
                              </div>
                              <div className="relative">
                                  <Search size={12} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-500" aria-hidden />
                                  <input
                                      type="search"
                                      value={pathSearch}
                                      onChange={(e) => setPathSearch(e.target.value)}
                                      placeholder="Search paths…"
                                      aria-label="Search Recent Activity by path"
                                      className="bg-slate-950 border border-slate-800 focus:border-slate-600 outline-none rounded-lg pl-7 pr-2.5 py-1 text-xs text-slate-200 placeholder:text-slate-600 font-mono w-56"
                                  />
                              </div>
                          </div>
                          <div className="overflow-auto">
                              <table className="w-full text-xs">
                                  <thead>
                                      <tr className="text-left text-slate-500 border-b border-slate-800">
                                          <th className="pb-2 pr-4 font-medium">Timestamp (UTC)</th>
                                          <th className="pb-2 pr-4 font-medium">User</th>
                                          <th className="pb-2 pr-4 font-medium">Action</th>
                                          <th className="pb-2 pr-4 font-medium">Path</th>
                                          <th className="pb-2 font-medium">Host</th>
                                      </tr>
                                  </thead>
                                  <tbody>
                                      {visibleRecent.length === 0 && (
                                          <tr>
                                              <td colSpan={5} className="py-4 text-center text-slate-500 text-xs">
                                                  No events match the current filters.
                                              </td>
                                          </tr>
                                      )}
                                      {visibleRecent.map((e, i) => {
                                          const action = ACTION_LOOKUP[e.action];
                                          return (
                                              <tr key={i} className="border-b border-slate-900 hover:bg-slate-950">
                                                  <td className="py-2 pr-4 text-slate-400 font-mono whitespace-nowrap">{e.ts}</td>
                                                  <td className="py-2 pr-4 text-slate-300 truncate max-w-[140px]">{e.user}</td>
                                                  <td className="py-2 pr-4">
                                                      <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-medium" style={{ backgroundColor: `${action?.color || "#94a3b8"}20`, color: action?.color || "#94a3b8" }}>
                                                          {e.action}
                                                      </span>
                                                  </td>
                                                  <td className="py-2 pr-4 text-slate-300 font-mono truncate max-w-[280px]" title={e.path}>{e.path}</td>
                                                  <td className="py-2 text-slate-400 font-mono truncate max-w-[140px]">{e.host}</td>
                                              </tr>
                                          );
                                      })}
                                  </tbody>
                              </table>
                          </div>
                      </Card>

                      <footer className="text-xs text-slate-600 flex items-center gap-2 pt-2 flex-wrap">
                          <Database size={12} aria-hidden />
                          <span>OpenSearch <code className="font-mono">audit-trail</code> · {fmtFull(META.totalEvents)} docs</span>
                          <span className="text-slate-700">·</span>
                          <Zap size={12} aria-hidden />
                          <span>Snapshot for {META.filespace}</span>
                      </footer>

                  </div>
              </div>
          );
      }

      createRoot(document.getElementById("root")).render(<Dashboard />);
    </script>
  </body>
</html>
