<nav id="breadcrumbs" class="breadcrumbs">
    <a class="breadcrumb-link breadcrumb-home" href="#" onclick="event.preventDefault(); fsIndex.navigate('/')">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h3v-6h6v6h3a1 1 0 0 0 1-1V10"/></svg>
    </a>
    {{range .}}
    <span class="breadcrumb-sep">/</span>
    {{if .IsLast}}<span class="breadcrumb-link">{{.Name}}</span>{{else}}<a class="breadcrumb-link" href="#" data-path="{{.Path}}" onclick="event.preventDefault(); fsIndex.navigate(this.dataset.path)">{{.Name}}</a>{{end}}
    {{end}}
</nav>
